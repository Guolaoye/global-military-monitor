{% extends 'base.html' %}
{% block title %}AI 知识问答{% endblock %}
{% block content %}
<div class="container">
    <h1>🤖 AI 知识问答</h1>
    <div class="chat-container">
        <div id="chat-history" class="chat-history"></div>
        <div class="chat-input">
            <textarea id="user-input" placeholder="请输入您的问题..." rows="3"></textarea>
            <button onclick="sendMessage()" class="btn btn-primary">发送</button>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function addMessage(role, content) {
    const hist = document.getElementById('chat-history');
    hist.innerHTML += '<div class="msg msg-'+role+'"><strong>'+(role=='user'?'你':'AI')+':</strong><pre>'+content+'</pre></div>';
    hist.scrollTop = hist.scrollHeight;
}
async function sendMessage() {
    const input = document.getElementById('user-input');
    const msg = input.value.trim();
    if(!msg) return;
    addMessage('user', msg);
    input.value = '';
    const resp = await fetch('/api/ai/analyze', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({query:msg})});
    const data = await resp.json();
    addMessage('assistant', data.success ? data.result : '错误: '+data.error);
}
</script>
<style>
.chat-container {display:flex; flex-direction:column; height: 70vh; background: #152238; border-radius: 10px; padding: 15px;}
.chat-history {flex:1; overflow-y:auto; padding: 10px;}
.msg {margin: 10px 0; padding: 10px; border-radius: 8px;}
.msg-user {background: #1976d2; margin-left: 50px;}
.msg-assistant {background: #263238; margin-right: 50px;}
.msg pre {margin: 5px 0; white-space: pre-wrap; font-size: 14px;}
.chat-input {display:flex; gap:10px; margin-top: 15px;}
.chat-input textarea {flex:1; background: #1e3a5f; border: 1px solid #2d4a6f; color: #e0e6ed; padding: 10px; border-radius: 5px; resize: none;}
</style>
{% endblock %}
