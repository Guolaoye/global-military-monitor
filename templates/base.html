<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ title }}{% endblock %} - 全球军事动态分析研判系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_head %}{% endblock %}

<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="logo">🛡️</span>
            <span class="title">全球军事动态分析研判系统</span>

</html>
